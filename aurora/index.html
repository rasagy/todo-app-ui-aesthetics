<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aurora Todo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <header class="app-header">
        <h1 id="app-title">Aurora Todo</h1>
        <p>One list. Keep it light. Check it off.</p>
      </header>

      <form id="todo-form" class="todo-form" autocomplete="off">
        <label class="sr-only" for="todo-input">Add a todo</label>
        <input
          id="todo-input"
          name="todo"
          type="text"
          maxlength="200"
          placeholder="Add a todo item"
          required
        />
        <button type="submit">Add</button>
      </form>
      <p id="storage-warning" class="storage-warning" role="status" hidden>
        Changes cannot be saved in localStorage right now.
      </p>

      <p id="empty-state" class="empty-state" role="status">
        No todos yet. Add one above.
      </p>
      <ul id="todo-list" class="todo-list" aria-label="Todo items"></ul>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
