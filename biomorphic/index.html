<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Biomorphic Todo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-layer" aria-hidden="true">
      <span class="blob blob-one"></span>
      <span class="blob blob-two"></span>
      <span class="blob blob-three"></span>
      <span class="blob blob-four"></span>
    </div>

    <main class="app-shell" aria-labelledby="todo-title">
      <header class="app-header">
        <h1 id="todo-title">Organic Todo</h1>
        <p class="app-subtitle">One flowing list, always in reach.</p>
      </header>

      <form id="todo-form" class="todo-form" autocomplete="off">
        <label class="sr-only" for="todo-input">Add a todo item</label>
        <input
          id="todo-input"
          name="todo"
          type="text"
          maxlength="200"
          placeholder="Add a task"
          required
        />
        <button type="submit">Add</button>
      </form>

      <p id="storage-note" class="storage-note" role="status" hidden>
        Local save is currently unavailable.
      </p>
      <p id="empty-state" class="empty-state" role="status">
        No todos yet. Add your first item.
      </p>

      <ul id="todo-list" class="todo-list" aria-label="Todo items"></ul>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
