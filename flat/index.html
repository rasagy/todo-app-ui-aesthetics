<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flat Todo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="todo-card">
        <header class="card-header">
          <p class="eyebrow">Daily Focus</p>
          <h1 id="app-title">Todo List</h1>
        </header>

        <form id="todo-form" class="todo-form" autocomplete="off">
          <label class="sr-only" for="todo-input">Add a todo item</label>
          <input
            id="todo-input"
            name="todo"
            type="text"
            maxlength="200"
            placeholder="Add a task..."
            required
          />
          <button type="submit">Add</button>
        </form>

        <p id="empty-state" class="empty-state" role="status">
          No tasks yet. Add your first one above.
        </p>

        <ul id="todo-list" class="todo-list" aria-label="Todo items"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
