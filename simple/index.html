<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Todo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <h1 id="app-title">Todo</h1>

      <form id="todo-form" class="todo-form" autocomplete="off">
        <label class="sr-only" for="todo-input">Add a todo</label>
        <input
          id="todo-input"
          name="todo"
          type="text"
          maxlength="200"
          placeholder="Add a todo"
          required
        />
        <button type="submit">Add</button>
      </form>

      <p id="empty-state" class="empty-state" role="status">
        No todos yet. Add one above.
      </p>
      <ul id="todo-list" class="todo-list" aria-label="Todo items"></ul>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
