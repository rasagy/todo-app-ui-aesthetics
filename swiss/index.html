<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swiss Todo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <p class="eyebrow">System 01</p>
        <h1>Todo Grid</h1>
      </header>

      <section class="composer" aria-label="Add todo">
        <label class="visually-hidden" for="todo-input">Todo text</label>
        <input
          id="todo-input"
          class="composer__input"
          type="text"
          placeholder="Add an item"
          autocomplete="off"
        />
        <button id="add-btn" class="composer__button" type="button">Add</button>
      </section>

      <section class="list-panel" aria-live="polite">
        <ul id="todo-list" class="todo-list"></ul>
        <p id="empty-state" class="empty-state">No items. Add one above.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
