<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes Todo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Todo app">
      <section class="notes-card" aria-label="Todo list container">
        <header class="notes-header">
          <h1>Todo List</h1>
          <p>Classic notes style, one page at a time.</p>
        </header>

        <form id="todo-form" class="add-row" autocomplete="off">
          <label for="todo-input" class="visually-hidden">New todo item</label>
          <input
            id="todo-input"
            name="todo"
            type="text"
            maxlength="200"
            placeholder="Write a task..."
            required
          />
          <button type="submit" id="add-button">Add</button>
        </form>

        <ul id="todo-list" class="todo-list" aria-live="polite">
          <li class="empty-state">No todos yet. Add one above.</li>
        </ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
