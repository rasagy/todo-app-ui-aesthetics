<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Shadcn Todo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="card">
        <p class="eyebrow">Focus List</p>
        <h1 id="app-title">Todo</h1>

        <form id="todo-form" class="todo-form" autocomplete="off">
          <label class="sr-only" for="todo-input">Add a todo item</label>
          <input
            id="todo-input"
            name="todo"
            type="text"
            maxlength="200"
            placeholder="Add a todo item"
            required
          />
          <button type="submit">Add</button>
        </form>

        <p id="empty-state" class="empty-state" role="status" aria-live="polite">
          No todos yet. Add one above.
        </p>

        <ul id="todo-list" class="todo-list" aria-label="Todo items"></ul>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
